<div class="capsule-layout-container">
  <!-- Floating Capsule Navigation Bar -->
  <header class="capsule-header">
    <div class="capsule-inner">
      <!-- Left: Minimal Circle Logo -->
      <div class="capsule-logo" (click)="scrollToId('home')">
        <div class="logo-circle">
          <app-icon name="code" [size]="14" class="logo-icon" />
        </div>
      </div>

      <!-- Center: Menu Items (Desktop only) -->
      @if (!isMobileScreen()) {
        <nav class="capsule-nav">
          @for (item of navItems; track item.id) {
            <button
              class="capsule-nav-link"
              [class.active]="activeSection() === item.id"
              (click)="scrollToId(item.id)"
            >
              {{ item.label }}
            </button>
          }
        </nav>
      }

      <!-- Right: Actions (Theme Toggle, Pill Button, and Mobile Menu) -->
      <div class="capsule-actions">
        <button
          class="capsule-action-btn theme-toggle-btn"
          [title]="'Switch to ' + (mode() === 'dark' ? 'Light' : 'Dark') + ' Mode'"
          (click)="toggleDark()"
        >
          <app-icon [name]="mode() === 'dark' ? 'lightMode' : 'darkMode'" [size]="16" />
        </button>

        @if (!isMobileScreen()) {
          <button
            class="capsule-action-btn contact-btn"
            [class.active]="activeSection() === 'contact'"
            (click)="scrollToId('contact')"
          >
            Get in Touch
          </button>
        }

        @if (isMobileScreen()) {
          <button
            class="capsule-action-btn menu-toggle-btn"
            (click)="toggleSidenav()"
            aria-label="Toggle Menu"
          >
            <app-icon [name]="isMobileOpen() ? 'close' : 'menu'" [size]="16" />
          </button>
        }
      </div>
    </div>
  </header>

  <!-- Mobile Drawer Menu Card -->
  @if (isMobileScreen() && isMobileOpen()) {
    <div class="mobile-drawer-card">
      <nav class="mobile-nav-list">
        @for (item of navItems; track item.id) {
          <button
            class="mobile-nav-item"
            [class.active]="activeSection() === item.id"
            (click)="scrollToId(item.id)"
          >
            <app-icon [name]="item.icon" [size]="16" class="mobile-nav-icon" />
            <span>{{ item.label }}</span>
          </button>
        }
        <button
          class="mobile-nav-item contact-nav-item"
          [class.active]="activeSection() === 'contact'"
          (click)="scrollToId('contact')"
        >
          <app-icon name="email" [size]="16" class="mobile-nav-icon" />
          <span>Get in Touch</span>
        </button>
      </nav>
    </div>
    <div class="drawer-overlay-backdrop" (click)="toggleSidenav()"></div>
  }

  <!-- Page Content Viewport -->
  <div class="page-content-wrapper">
    <main class="page-main">
      <div class="app-content-inner">
        <app-sections
          (setActiveSection)="activeSection.set($event)"
          (initObserver)="setObserver($event)"
        />
      </div>
    </main>
  </div>
</div>
