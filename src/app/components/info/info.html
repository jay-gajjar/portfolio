<section class="info">
  <div class="heroImageContainer">
    <div class="profile-wrapper">
      <div class="profile-glow"></div>
      <div class="profile-frame">
        <img ngSrc="images/avatar.png" width="320" height="320" priority alt="Jay Gajjar" />
      </div>

      <div class="floating-badge badge-1">
        <mat-icon>code</mat-icon>
        <span>Angular Developer</span>
      </div>
      <div class="floating-badge badge-2">
        <mat-icon>bolt</mat-icon>
        <span>UI/UX Expert</span>
      </div>
    </div>
  </div>

  <div class="heroDescription">
    <div class="greeting-chip">HI THERE! I'M</div>
    <h1 class="hero-name"><span class="gradient-text">JAY</span> GAJJAR</h1>
    <p class="smallBio">
      A <span class="highlight-span">Front-End Web Developer</span> dedicated to Building scalable &
      high-performance web applications with a focus on user experience, accessibility, and modern
      web standards.
    </p>
    <div class="socialsResume">
      <a
        class="resumeLink"
        mat-flat-button
        href="resume.pdf"
        alt="Jay's resume"
        target="_blank"
        (click)="downloadResume()"
        rel="noopener noreferrer"
      >
        <mat-icon>download</mat-icon> Download Resume
      </a>

      <a
        class="contactBtn"
        mat-stroked-button
        href="#contact"
        alt="Contact Jay"
        (click)="$event.preventDefault(); scrollToContact()"
      >
        Get in Touch
      </a>
    </div>
  </div>
</section>
