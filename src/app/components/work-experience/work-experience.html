<section class="works-section">
  <div class="sectionHead">
    <span>TAKE A LOOK AT MY</span>
    <h2>WORK EXPERIENCE</h2>
  </div>

  <mat-card appearance="outlined" class="worksContainer sectionContainer">
    @for (experience of experiences; track experience.company; let last = $last) {
    <article class="work-box">
      <div class="work-describe-container">
        <div class="work-company">{{ experience.company }}</div>
        <div class="work-duration">{{ experience.duration }}</div>
        <ul>
          @for (responsibility of experience.responsibilities; track responsibility) {
          <li>{{ responsibility }}</li>
          }
        </ul>
      </div>
    </article>

    @if (!last) {
    <mat-divider />
    } }
  </mat-card>
</section>
