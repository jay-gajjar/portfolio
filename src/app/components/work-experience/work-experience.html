<section class="works-section">
  <div class="sectionHead">
    <span>TAKE A LOOK AT MY</span>
    <h2>WORK EXPERIENCE</h2>
  </div>

  <div class="timeline-container">
    @for (experience of experiences; track experience.company) {
    <article class="timeline-item">
      <!-- Left Column: Dates -->
      <div class="timeline-left">
        <span class="work-duration">{{ experience.duration }}</span>
      </div>

      <!-- Center Line & Dot -->
      <div class="timeline-middle">
        <div class="timeline-dot"></div>
      </div>

      <!-- Right Column: Card details -->
      <div class="timeline-card">
        <div class="experience-header">
          <h3 class="work-company">{{ experience.company }}</h3>
        </div>

        <ul class="responsibility-list">
          @for (responsibility of experience.responsibilities; track responsibility) {
          <li class="responsibility-item">
            <app-icon name="verified" [size]="14" class="check-icon" />
            <span class="responsibility-text">{{ responsibility }}</span>
          </li>
          }
        </ul>
      </div>
    </article>
    }
  </div>
</section>
